name: Build and Release

# Triggers on a version tag push (e.g. git tag v1.2.3 && git push --tags)
# or manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3)'
        required: true
        default: '1.0.0'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create the GitHub release

    steps:
      # ── Checkout ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── .NET Setup ────────────────────────────────────────────────
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # ── Resolve version ───────────────────────────────────────────
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Strip the leading 'v' from the tag name
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      # ── Verify version files match the tag/input version ─
      # Catches the common failure mode of pushing a tag without bumping the files.
      # Both Directory.Build.props AND PackTracker.Presentation.csproj must match,
      # since the .csproj <Version> overrides Directory.Build.props for the WPF host.
      - name: Verify version files match tag
        shell: pwsh
        run: |
          $expected = "${{ steps.version.outputs.VERSION }}"

          function Get-XmlVersion($path, $node) {
            [xml]$xml = Get-Content $path
            $value = $xml.Project.PropertyGroup.$node
            if ($value -is [System.Array]) { $value = $value | Where-Object { $_ } | Select-Object -First 1 }
            return "$value".Trim()
          }

          $propsVersion = Get-XmlVersion 'Directory.Build.props' 'Version'
          $csprojVersion = Get-XmlVersion 'PackTracker.Presentation/PackTracker.Presentation.csproj' 'Version'

          $mismatches = @()
          if ($propsVersion  -ne $expected) { $mismatches += "Directory.Build.props=$propsVersion" }
          if ($csprojVersion -ne $expected) { $mismatches += "PackTracker.Presentation.csproj=$csprojVersion" }

          if ($mismatches.Count -gt 0) {
            Write-Error "Version mismatch: tag/input='$expected' but $($mismatches -join ', '). Run scripts/bump-version.ps1 $expected before tagging."
            exit 1
          }
          Write-Host "Version gate passed: $expected (props + csproj in sync)"

      # ── Restore ───────────────────────────────────────────────────
      - name: Restore
        run: dotnet restore PackTracker.sln

      # ── Test (gate: release is rejected if any test fails) ────────
      - name: Test Integration
        shell: pwsh
        run: |
          dotnet test tests/PackTracker.IntegrationTests/PackTracker.IntegrationTests.csproj `
            --no-restore `
            --configuration Release `
            --logger "console;verbosity=normal" `
            --logger "trx;LogFileName=integration-results.trx"

      - name: Test API
        shell: pwsh
        run: |
          dotnet test tests/PackTracker.ApiTests/PackTracker.ApiTests.csproj `
            --no-restore `
            --configuration Release `
            --logger "console;verbosity=normal" `
            --logger "trx;LogFileName=api-results.trx"

      - name: Test Unit
        shell: pwsh
        run: |
          dotnet test tests/PackTracker.UnitTests/PackTracker.UnitTests.csproj `
            --no-restore `
            --configuration Release `
            --logger "console;verbosity=normal" `
            --logger "trx;LogFileName=unit-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-results-${{ steps.version.outputs.VERSION }}
          path: |
            tests/PackTracker.IntegrationTests/TestResults/*.trx
            tests/PackTracker.ApiTests/TestResults/*.trx
            tests/PackTracker.UnitTests/TestResults/*.trx
          if-no-files-found: warn

      # ── Inject production secrets into appsettings.json ───────────
      # These values are stored as GitHub Actions secrets and are never
      # committed to the repo.  They replace the empty placeholder values
      # so that every user who installs the app connects to the shared backend.
      - name: Inject secrets into appsettings.json
        shell: pwsh
        env:
          CONN:     ${{ secrets.NEON_CONNECTION_STRING }}
          JWT_KEY:  ${{ secrets.JWT_KEY }}
          REGO_KEY: ${{ secrets.REGOLITH_API_KEY }}
          UEX_KEY:  ${{ secrets.UEX_API_KEY }}
        run: |
          $path = "PackTracker.Presentation/appsettings.json"
          $json = Get-Content $path -Raw | ConvertFrom-Json
          $json.ConnectionStrings.DefaultConnection = $env:CONN
          $json.Authentication.Jwt.Key              = $env:JWT_KEY
          $json.Uex.ApiKey                          = $env:UEX_KEY
          $json | ConvertTo-Json -Depth 10 | Set-Content $path
          Write-Host "appsettings.json patched."

      # ── Publish all output to publish/ (no single-file — WebView2 requires loose DLLs)
      - name: Publish
        shell: pwsh
        run: |
          dotnet publish PackTracker.Presentation/PackTracker.Presentation.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            --output publish/

      # ── Build installer (Inno Setup) ──────────────────────────────
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ steps.version.outputs.VERSION }} `
            installer\PackTrackerSetup.iss
          # Confirm output
          Get-Item installer/output/PackTrackerSetup-${{ steps.version.outputs.VERSION }}.exe

      # ── Create GitHub Release ─────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PackTracker v${{ steps.version.outputs.VERSION }}
          files: installer/output/PackTrackerSetup-${{ steps.version.outputs.VERSION }}.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
