name: Build and Release

# Triggers on a version tag push (e.g. git tag v1.2.3 && git push --tags)
# or manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3)'
        required: true
        default: '1.0.0'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create the GitHub release

    steps:
      # ── Checkout ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── .NET Setup ────────────────────────────────────────────────
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # ── Resolve version ───────────────────────────────────────────
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Strip the leading 'v' from the tag name
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      # ── Restore ───────────────────────────────────────────────────
      - name: Restore
        run: dotnet restore PackTracker.Presentation/PackTracker.Presentation.csproj

      # ── Inject production secrets into appsettings.json ───────────
      # These values are stored as GitHub Actions secrets and are never
      # committed to the repo.  They replace the empty placeholder values
      # so that every user who installs the app connects to the shared backend.
      - name: Inject secrets into appsettings.json
        shell: pwsh
        env:
          CONN:     ${{ secrets.NEON_CONNECTION_STRING }}
          JWT_KEY:  ${{ secrets.JWT_KEY }}
          REGO_KEY: ${{ secrets.REGOLITH_API_KEY }}
          UEX_KEY:  ${{ secrets.UEX_API_KEY }}
        run: |
          $path = "PackTracker.Presentation/appsettings.json"
          $json = Get-Content $path -Raw | ConvertFrom-Json
          $json.ConnectionStrings.DefaultConnection = $env:CONN
          $json.Jwt.Key                             = $env:JWT_KEY
          $json.Regolith.ApiKey                     = $env:REGO_KEY
          $json.Uex.ApiKey                          = $env:UEX_KEY
          $json | ConvertTo-Json -Depth 10 | Set-Content $path
          Write-Host "appsettings.json patched."

      # ── Publish all output to publish/ (no single-file — WebView2 requires loose DLLs)
      - name: Publish
        shell: pwsh
        run: |
          dotnet publish PackTracker.Presentation/PackTracker.Presentation.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            --output publish/

      # ── Build installer (Inno Setup) ──────────────────────────────
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ steps.version.outputs.VERSION }} `
            installer\PackTrackerSetup.iss
          # Confirm output
          Get-Item installer/output/PackTrackerSetup-${{ steps.version.outputs.VERSION }}.exe

      # ── SignPath cloud signing ────────────────────────────────────
      # Prerequisites (one-time setup):
      #   1. SignPath dashboard → Projects → PackTracker → Artifact Configurations
      #      Create config named "PackTracker-installer", add a PE_FILE element for
      #      PackTrackerSetup-*.exe  (use a wildcard or exact name)
      #   2. SignPath dashboard → Projects → PackTracker → Signing Policies
      #      Create policy named "release-signing", attach your Open Source certificate
      #   3. GitHub repo → Settings → Secrets → Actions:
      #        SIGNPATH_API_TOKEN          (SignPath → User menu → API token)
      #        SIGNPATH_ORGANIZATION_ID    (SignPath → Settings → Organization, the GUID)
      - name: Upload installer for signing
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: installer/output/PackTrackerSetup-${{ steps.version.outputs.VERSION }}.exe

      - name: Sign installer via SignPath
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: PackTracker
          signing-policy-slug: release-signing
          artifact-configuration-slug: PackTracker-installer
          github-artifact-id: unsigned-installer
          wait-for-completion: true
          output-artifact-directory: installer/output/

      # ── Create GitHub Release ─────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PackTracker v${{ steps.version.outputs.VERSION }}
          files: installer/output/PackTrackerSetup-${{ steps.version.outputs.VERSION }}.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
